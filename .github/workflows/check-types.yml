name: Check types of TypeScript code

on:
  pull_request:
    branches:
      - main
    paths:
      - code/**
      - code/*
      - Dockerfile
  workflow_run:
    workflows: ["Check Version"]
    types:
      - completed

permissions:
  contents: read

jobs:
  check-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #v4 <- pinned commit for safety
        with:
          version: 10.2.1

      - name: Setup Node.js and cache dependencies
        uses: actions/setup-node@v6
        with:
          node-version-file: code/package.json
          cache-dependency-path: code/pnpm-lock.yaml
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        working-directory: code 

      - name: Check Types
        run: pnpm tsc
        working-directory: code